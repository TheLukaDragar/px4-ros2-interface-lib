# ROS 2 .deb builds for px4_ros2_cpp via shared pipelines in drones/ci_scripts
# (same pattern as drones/px4_msgs).
#
# Required CI/CD variables on this project:
#   REGISTRY / REGISTRY_USER / DOCKER_REGISTRY_PASSWORD (masked)
#   PUSH_TOKEN_PPA — GitLab PAT for the PPA package repo push
#
# Runners must provide Docker+dind-capable jobs tagged `ava` and `jetson6.2`.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
  auto_cancel:
    on_new_commit: interruptible

include:
  - project: "drones/ci_scripts"
    ref: main
    file: "/ros_package_build.gitlab-ci.yml"
